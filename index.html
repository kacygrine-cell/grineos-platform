function RegimeProvider({children}) {
  const [regime, setRegime] = useState({
    current: 'expansion',
    confidence: 94,
    drivers: { volatility: -2, momentum: 1, liquidity: 1 },
    mode: 'auto',
    timeHorizon: '3M'
  });
  
  const [isRegimeActive, setIsRegimeActive] = useState(true);
  
  // Simulate regime updates (in real implementation, this would fetch from API)
  useEffect(() => {
    if (regime.mode === 'auto') {
      const interval = setInterval(() => {
        // Simulate small confidence fluctuations
        setRegime(prev => ({
          ...prev,
          confidence: Math.max(85, Math.min(98, prev.confidence + (Math.random() - 0.5) * 4))
        }));
      }, 30000);
      return () => clearInterval(interval);
    }
  }, [regime.mode]);
  
  return (
    <RegimeContext.Provider value={{
      regime,
      setRegime,
      isRegimeActive,
      setIsRegimeActive,
      regimeConfig: REGIME_PARAMETERS[regime.current]
    }}>
      {children}
    </RegimeContext.Provider>
  );
}

function DonutChart({data,size=180,thickness=28,totalValue}){
  // Handle different data structures - portfolio holdings vs optimizer results
  let chartData, displayTotal;
  
  if (Array.isArray(data)) {
    // Regular portfolio holdings format
    chartData = data;
    displayTotal = totalValue || data.reduce((s,d)=>s+(d.value||0),0);
  } else if (data && typeof data === 'object') {
    // Optimizer result format - convert allocation percentages to chart data
    chartData = Object.entries(data).map(([ticker, percentage]) => ({
      label: ticker,
      value: percentage * (totalValue || 1000000) / 100 // Convert percentage to dollar value
    }));
    displayTotal = totalValue || chartData.reduce((s,d)=>s+d.value,0);
  } else {
    return React.createElement("div", {style: {
      width: size, 
      height: size, 
      display: 'flex', 
      alignItems: 'center', 
      justifyContent: 'center',
      background: C.borderLight,
      borderRadius: '50%',
      color: C.soft,
      fontSize: 12
    }}, "No data");
  }
  
  const total = displayTotal;
  if(total===0)return React.createElement("div", {style: {
    width: size, 
    height: size, 
    display: 'flex', 
    alignItems: 'center', 
    justifyContent: 'center',
    background: C.borderLight,
    borderRadius: '50%',
    color: C.soft,
    fontSize: 12
  }}, "No value");
  
  const cx=size/2,cy=size/2,r=(size-thickness)/2;
  let cum=-90;
  const paths=chartData.map((d,i)=>{
    const pct=d.value/total,angle=pct*360,start=cum;cum+=angle;
    const sr=(start*Math.PI)/180,er=(cum*Math.PI)/180;
    const x1=cx+r*Math.cos(sr),y1=cy+r*Math.sin(sr),x2=cx+r*Math.cos(er),y2=cy+r*Math.sin(er);
    return React.createElement("path",{key:i,d:`M ${x1} ${y1} A ${r} ${r} 0 ${angle>180?1:0} 1 ${x2} ${y2}`,fill:"none",stroke:CHART_COLORS[i%CHART_COLORS.length],strokeWidth:thickness,strokeLinecap:"round",style:{opacity:0.85}});
  });
  return React.createElement("svg",{width:size,height:size,viewBox:`0 0 ${size} ${size}`},
    React.createElement("circle",{cx,cy,r,fill:"none",stroke:C.border,strokeWidth:thickness,opacity:0.3}),
    ...paths,
    React.createElement("text",{x:cx,y:cy-6,textAnchor:"middle",fill:C.navy,fontFamily:T.display,fontSize:17,fontWeight:600},"$"+(total/1e6).toFixed(1)+"M"),
    React.createElement("text",{x:cx,y:cy+12,textAnchor:"middle",fill:C.soft,fontFamily:T.body,fontSize:10},"Total Value")
  );
}

function OptimizerResult({data, regimeAdjustment}){
  const { getActivePortfolio } = usePortfolio();
  
  if(!data) return null;
  
  // Get portfolio value from context
  const portfolioValue = getActivePortfolio()?.totalValue || 2000000;
  
  const isRegimeAware = !!regimeAdjustment;
  
  // Extract allocation data
  const currentWeights = data.current_weights || {};
  const targetWeights = data.target_weights || {};
  const allocation = data.allocation || targetWeights;
  
  // Calculate metrics
  const totalCurrent = Object.values(currentWeights).reduce((sum, weight) => sum + weight, 0);
  const totalTarget = Object.values(targetWeights).reduce((sum, weight) => sum + weight, 0);
  const numHoldings = Object.keys(allocation).length;
  
  // Calculate turnover if both current and target exist
  const turnover = Object.keys({...currentWeights, ...targetWeights}).reduce((sum, ticker) => {
    const current = currentWeights[ticker] || 0;

    return sum + Math.abs(target - current);

function PerformanceChart({data, regimeAware}){
  // Simplified performance chart - in a real implementation this would use a charting library
  const chartHeight = 200;
  const chartWidth = 600;
  
  if(!data || data.length === 0) {
    return React.createElement("div", {style: {
      height: chartHeight,
      display: "flex",
      alignItems: "center", 
      justifyContent: "center",
      background: C.borderLight,
      borderRadius: 6,
      color: C.soft,
      fontSize: 13
    }}, "Performance data visualization would appear here");
  }
  
  // Simple line chart representation
  const maxVal = Math.max(...data.map(d => d.value || d));
  const minVal = Math.min(...data.map(d => d.value || d));
  const range = maxVal - minVal || 1;
  
  const points = data.map((d, i) => {
    const x = (i / (data.length - 1)) * chartWidth;
    const value = typeof d === 'object' ? d.value : d;
    const y = chartHeight - ((value - minVal) / range) * chartHeight;
    return `${x},${y}`;
  }).join(' ');
  
  return React.createElement("svg", {width: chartWidth, height: chartHeight, style: {width: "100%", height: chartHeight}},
    React.createElement("polyline", {
      points,
      fill: "none",
      stroke: regimeAware ? C.green : C.blue,
      strokeWidth: 2,
      style: {opacity: 0.8}
    }),
    React.createElement("text", {x: 10, y: 20, fill: C.soft, fontSize: 11}, `+${((maxVal || 0) * 100).toFixed(1)}%`),
    React.createElement("text", {x: 10, y: chartHeight - 10, fill: C.soft, fontSize: 11}, `${((minVal || 0) * 100).toFixed(1)}%`)
  );
}

function AgentTab({token,demoP}){
  const [messages,setMessages]=useState([]);const [input,setInput]=useState("");const [loading,setLoading]=useState(false);
  const { regime, regimeConfig } = useRegime();
  
  const sendMessage=async()=>{
    if(!input.trim()||loading)return;
    const userMsg={role:"user",content:input};
    setMessages(prev=>[...prev,userMsg]);
    const currentInput=input;
    setInput("");setLoading(true);
    
    try{
      // Add regime context to the message
      const contextualMessage = `
REGIME CONTEXT:
Current Regime: ${regimeConfig.label} (${Math.round(regime.confidence)}% confidence)
Regime Description: ${regimeConfig.description}
Portfolio: Sarah Mitchell $2M allocation

USER QUERY: ${currentInput}

Please respond as a senior institutional CIO with the following structure:
**REGIME ASSESSMENT:** Brief regime interpretation
**MARKET VIEW:** Current environment implications  
**ALLOCATION GUIDANCE:** Specific portfolio recommendations
**RISK CONSIDERATIONS:** Key risks and hedges
`;
      
      const d=await apiFetch("/api/v1/agent/chat",token,{method:"POST",body:JSON.stringify({message:contextualMessage,portfolio_context:demoP})});
      setMessages(prev=>[...prev,{role:"assistant",content:d.response||d.message||"Response received."}]);
    }catch(e){
      setMessages(prev=>[...prev,{role:"assistant",content:`Error: ${e.message}`}]);
    }finally{setLoading(false)}

  return React.createElement("div",{style:{padding:"32px 40px",maxWidth:1000,animation:"fadeUp .4s ease",height:"calc(100vh - 200px)",display:"flex",flexDirection:"column"}},
    React.createElement("div",{style:{marginBottom:28,borderBottom:`1px solid ${C.border}`,paddingBottom:16}},
