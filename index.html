function RegimeProvider({children}) {
  const [regime, setRegime] = useState({
    current: 'expansion',
    confidence: 94,
    drivers: { volatility: -2, momentum: 1, liquidity: 1 },
    mode: 'auto',
    timeHorizon: '3M'
  });
  
  const [isRegimeActive, setIsRegimeActive] = useState(true);
  
  // Simulate regime updates (in real implementation, this would fetch from API)
  useEffect(() => {
    if (regime.mode === 'auto') {
      const interval = setInterval(() => {
        // Simulate small confidence fluctuations
        setRegime(prev => ({
          ...prev,
          confidence: Math.max(85, Math.min(98, prev.confidence + (Math.random() - 0.5) * 4))
        }));
      }, 30000);
      return () => clearInterval(interval);
    }
  }, [regime.mode]);
  
  return (
    <RegimeContext.Provider value={{
      regime,
      setRegime,
      isRegimeActive,
      setIsRegimeActive,
      regimeConfig: REGIME_PARAMETERS[regime.current]
    }}>
      {children}
    </RegimeContext.Provider>
  );
}

function DonutChart({data,size=180,thickness=28}){
  const total=data.reduce((s,d)=>s+d.value,0);
  if(total===0)return null;
  const cx=size/2,cy=size/2,r=(size-thickness)/2;
  let cum=-90;
  const paths=data.map((d,i)=>{
    const pct=d.value/total,angle=pct*360,start=cum;cum+=angle;
    const sr=(start*Math.PI)/180,er=(cum*Math.PI)/180;
    const x1=cx+r*Math.cos(sr),y1=cy+r*Math.sin(sr),x2=cx+r*Math.cos(er),y2=cy+r*Math.sin(er);
    return React.createElement("path",{key:i,d:`M ${x1} ${y1} A ${r} ${r} 0 ${angle>180?1:0} 1 ${x2} ${y2}`,fill:"none",stroke:CHART_COLORS[i%CHART_COLORS.length],strokeWidth:thickness,strokeLinecap:"round",style:{opacity:0.85}});
  });
  return React.createElement("svg",{width:size,height:size,viewBox:`0 0 ${size} ${size}`},
    React.createElement("circle",{cx,cy,r,fill:"none",stroke:C.border,strokeWidth:thickness,opacity:0.3}),
    ...paths,
    React.createElement("text",{x:cx,y:cy-6,textAnchor:"middle",fill:C.navy,fontFamily:T.display,fontSize:17,fontWeight:600},"$"+(total/1e6).toFixed(1)+"M"),
    React.createElement("text",{x:cx,y:cy+12,textAnchor:"middle",fill:C.soft,fontFamily:T.body,fontSize:10},"Total Value")
  );
}

function HBarChart({data}){
  const maxVal=Math.max(...data.map(d=>Math.abs(d.value)),0.01);
  return React.createElement("div",{style:{display:"flex",flexDirection:"column",gap:10}},
    data.map((d,i)=>{
      const pct=Math.abs(d.value)/maxVal*100,isNeg=d.value<0,color=d.color||CHART_COLORS[i%CHART_COLORS.length];
      return React.createElement("div",{key:i,style:{animation:`fadeUp 0.3s ease ${i*0.04}s both`}},
        React.createElement("div",{style:{display:"flex",justifyContent:"space-between",marginBottom:3}},
          React.createElement("span",{style:{fontSize:13,color:C.navy,fontWeight:500}},d.label),
          React.createElement("span",{style:{fontSize:13,fontFamily:T.mono,color:isNeg?C.red:C.navy,fontWeight:600}},typeof d.display==="string"?d.display:(d.value>=0?"+":"")+d.value.toFixed(2)+"%")
        ),
        React.createElement("div",{style:{height:5,background:C.borderLight,borderRadius:3,overflow:"hidden"}},

    })

}

function SmartResult({data}){

  if(Array.isArray(data))return React.createElement(DataTable,{headers:["Metric","Value"],rows:data.map(d=>[d.label||d.name||"—",d.value||"—"])});
  if(typeof data==="object"&&data.allocation)return React.createElement("div",{style:{display:"grid",gridTemplateColumns:"300px 1fr",gap:24}},
    React.createElement(DonutChart,{data:Object.entries(data.allocation).map(([k,v])=>({label:k,value:v}))}),
    React.createElement(HBarChart,{data:Object.entries(data.allocation).map(([k,v])=>({label:k,value:v}))})
  );
  if(typeof data==="object")return React.createElement("pre",{style:{fontSize:12,fontFamily:T.mono,background:C.borderLight,padding:12,borderRadius:6,overflow:"auto",maxHeight:300}},JSON.stringify(data,null,2));
