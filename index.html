<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body,#root{height:100%;width:100%}
body{background:#f8f9fb;color:#1a2332;font-family:'DM Sans',sans-serif}

@keyframes spin{to{transform:rotate(360deg)}}
@keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes slideIn{from{opacity:0;transform:translateX(-6px)}to{opacity:1;transform:translateX(0)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.5}}
@keyframes pulseRing{0%{transform:scale(0.8);opacity:0.8}100%{transform:scale(2.2);opacity:0}}
@keyframes tickerScroll{0%{transform:translateX(0)}100%{transform:translateX(-50%)}}
@keyframes counterUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

::-webkit-scrollbar{width:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:#d0d5dd;border-radius:3px}
input:focus,textarea:focus{border-color:#1a2332!important;box-shadow:0 0 0 2px rgba(26,35,50,0.08)!important;outline:none}
.regime-indicator{animation:pulse 2s infinite}

/* Landing specific */
.landing-hero{
  background:#0f1923;
  min-height:100vh;
  position:relative;
  overflow:hidden;
}
.hero-noise{
  position:absolute;inset:0;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
  pointer-events:none;opacity:0.6;
}
.hero-grid{
  position:absolute;inset:0;
  background-image:linear-gradient(rgba(255,255,255,0.02) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,0.02) 1px,transparent 1px);
  background-size:64px 64px;
  pointer-events:none;
}
.section-enter{opacity:0;transform:translateY(20px);transition:opacity 0.7s ease,transform 0.7s ease}
.section-enter.visible{opacity:1;transform:translateY(0)}

.regime-live-dot{
  width:8px;height:8px;border-radius:50%;background:#16a34a;
  position:relative;display:inline-block;
}
.regime-live-dot::before{
  content:'';position:absolute;inset:-4px;border-radius:50%;
  background:#16a34a;animation:pulseRing 1.8s ease-out infinite;
}

.ticker-wrap{overflow:hidden;white-space:nowrap}
.ticker-inner{display:inline-flex;animation:tickerScroll 28s linear infinite}
.ticker-inner:hover{animation-play-state:paused}

.stat-num{
  font-family:'Source Serif 4',Georgia,serif;
  font-size:48px;font-weight:600;
  background:linear-gradient(135deg,#fff 0%,rgba(255,255,255,0.7) 100%);

const useRegime=()=>useContext(RegimeContext);

// -- Engine A live hook --------------------------------------------------------
function useEngineA(){
  const[summary,setSummary]=useState(null);
  const[loading,setLoading]=useState(true);
  const[error,setError]=useState(null);
  const[lastUpdated,setLastUpdated]=useState(null);
  const fetch_=useCallback(async()=>{
    try{
      const res=await fetch(`${ENGINE_A}/regime/summary`);
      if(!res.ok)throw new Error(`Engine A ${res.status}`);
      setSummary(await res.json());
      setLastUpdated(new Date());
      setError(null);
    }catch(e){setError(e.message);}
    finally{setLoading(false);}
  },[]);
  useEffect(()=>{fetch_();const id=setInterval(fetch_,5*60*1000);return()=>clearInterval(id);},[fetch_]);
  return{summary,loading,error,lastUpdated,refresh:fetch_};
}

// Keep REGIME_PARAMETERS for legacy compatibility with existing tabs
const REGIME_PARAMETERS={
  expansion:{label:"EXPANSION",color:"#16a34a",bgColor:"rgba(22,163,74,0.1)",volatilityTarget:[0.08,0.12],equityMax:0.80,cashMin:0.02,bondAllocation:0.15,returnMultiplier:1.15,description:"Risk assets favored, low volatility environment"},
  protection:{label:"PROTECTION",color:"#dc2626",bgColor:"rgba(220,38,38,0.1)",volatilityTarget:[0.06,0.10],equityMax:0.50,cashMin:0.15,bondAllocation:0.35,returnMultiplier:0.85,description:"Defensive positioning, capital preservation focus"},
  transition:{label:"TRANSITION",color:"#b45309",bgColor:"rgba(180,83,9,0.1)",volatilityTarget:[0.10,0.14],equityMax:0.65,cashMin:0.08,bondAllocation:0.25,returnMultiplier:1.0,description:"Balanced approach, regime uncertainty"}
};

function RegimeProvider({children}){
  const{summary,loading,error,lastUpdated,refresh}=useEngineA();
  const[isRegimeActive,setIsRegimeActive]=useState(true);
  // Build regimeConfig from live Engine A data, fall back to static if offline
  const code=summary?.state?.code||"SURGE";
  const liveConfig={
    current:code.toLowerCase(),
    label:code,
    subtitle:summary?.state?.subtitle||"Risk Expansion",
    color:REGIME_COLORS[code]||"#16a34a",
    bgColor:REGIME_BG[code]||"rgba(22,163,74,0.1)",
    confidence:summary?.state?.confidence||94,
    confidenceDelta:summary?.state?.confidence_delta||0,
    persistence:summary?.state?.confidence_persistence||0,
    duration:summary?.state?.duration_days||0,
    description:summary?.state?.description||"Risk assets favored, low volatility environment",
    instinct:summary?.state?.instinct||"",
    tagline:summary?.state?.tagline||"",
    drivers:summary?.state?.drivers||{},
    transitions:summary?.transitions||[],
    narrative:summary?.narrative||null,
    exposure:summary?.exposure||null,
    returnMultiplier:1.1,equityMax:0.80,cashMin:0.02,bondAllocation:0.15,
  };
  // Legacy regime object for existing components
  const regime={
    current:liveConfig.current,
    confidence:liveConfig.confidence,
    drivers:{volatility:liveConfig.drivers?.volatility?.score||0,momentum:liveConfig.drivers?.growth?.score||0,liquidity:liveConfig.drivers?.liquidity?.score||0},
    mode:'auto',timeHorizon:'3M'
  };
  return <RegimeContext.Provider value={{regime,setRegime:()=>{},isRegimeActive,setIsRegimeActive,regimeConfig:liveConfig,engineLoading:loading,engineError:error,lastUpdated,refresh}}>{children}</RegimeContext.Provider>;
}

  const dirText={"up2":"  ","up":" ","--":"-","dn":" ","dn2":"  "};
  return(
    <div>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
        <h3 style={{fontSize:13,fontWeight:600,color:C.navy,textTransform:"uppercase",letterSpacing:"0.08em"}}>Live Exposure Map</h3>
        <span style={{fontSize:10,padding:"3px 8px",borderRadius:4,background:regimeConfig.bgColor,color:regimeConfig.color,fontWeight:600,fontFamily:T.mono}}>{regimeConfig.label}</span>

      <div style={{background:C.white,border:`1px solid ${C.border}`,borderRadius:8,overflow:"hidden"}}>
        <div style={{display:"grid",gridTemplateColumns:"2fr 1.6fr 0.5fr 0.9fr 0.7fr",background:C.navy,padding:"9px 14px"}}>
          {["Asset Class","Signal","Dir","Magnitude","Conf"].map((h,i)=><div key={i} style={{fontSize:9,fontWeight:600,color:"rgba(255,255,255,0.6)",textTransform:"uppercase",letterSpacing:"0.08em"}}>{h}</div>)}
        </div>

            <div style={{fontSize:11,color:C.soft}}>{row.magnitude}</div>
            <div style={{fontSize:11,fontFamily:T.mono,color:C.navy,fontWeight:600}}>{row.confidence.toFixed(0)}%</div>

        </div>

}

// -- Live Driver Panel ---------------------------------------------------------
function DriverPanel(){
  const{regimeConfig}=useRegime();
  const drivers=regimeConfig.drivers||{};
  return(
    <div>
      <h3 style={{fontSize:13,fontWeight:600,color:C.navy,textTransform:"uppercase",letterSpacing:"0.08em",marginBottom:10}}>Signal Drivers</h3>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
        {[["growth","Growth"],["inflation","Inflation"],["liquidity","Liquidity"],["volatility","Volatility"]].map(([key,label])=>{
          const d=drivers[key];if(!d)return<div key={key} style={{background:C.borderLight,borderRadius:8,padding:12,height:80}}/>;
          const isVol=key==="volatility";
          const color=isVol?(d.score>0?"#dc2626":"#16a34a"):(d.score>0?"#16a34a":"#dc2626");
          return(
            <div key={key} style={{background:C.white,border:`1px solid ${C.border}`,borderRadius:8,padding:12}}>
              <div style={{fontSize:9,color:C.faint,textTransform:"uppercase",letterSpacing:"0.08em",marginBottom:4,fontFamily:T.mono}}>{label}</div>
              <div style={{fontSize:16,fontWeight:600,color,fontFamily:T.display,marginBottom:4}}>{d.label}</div>
              <div style={{height:3,background:C.borderLight,borderRadius:2,marginBottom:4,overflow:"hidden"}}>
                <div style={{width:`${Math.abs(d.score)/2*100}%`,height:"100%",background:color,borderRadius:2}}/>
              </div>
              <div style={{fontSize:9,fontFamily:T.mono,color}}>
                {d.trend==="rising"?" ":d.trend==="falling"?" ":"->"} {d.score>0?"+":""}{d.score.toFixed(2)}s
              </div>
            </div>
          );
        })}
      </div>
    </div>
  );
}

// -- 90-day Regime Timeline ----------------------------------------------------
function RegimeTimeline(){
  const[history,setHistory]=useState([]);
  useEffect(()=>{
    fetch(`${ENGINE_A}/regime/history?days=90`).then(r=>r.json()).then(d=>setHistory(d.history||[])).catch(()=>{});
  },[]);
  if(!history.length)return null;
  return(
    <div style={{marginTop:24}}>
      <div style={{fontSize:10,color:C.faint,textTransform:"uppercase",letterSpacing:"0.08em",marginBottom:6,fontFamily:T.mono}}>90-Day Regime History</div>
      <div style={{height:12,borderRadius:4,overflow:"hidden",display:"flex"}}>
        {history.map((r,i)=>(
          <div key={i} title={`${new Date(r.date).toLocaleDateString()} - ${r.regime}`}
            style={{flex:1,background:REGIME_COLORS[r.regime]||C.soft,opacity:0.75,transition:"opacity 0.2s",cursor:"default"}}
            onMouseEnter={e=>e.target.style.opacity="1"} onMouseLeave={e=>e.target.style.opacity="0.75"}/>
        ))}
      </div>
      <div style={{display:"flex",justifyContent:"space-between",marginTop:3,fontSize:9,color:C.faint,fontFamily:T.mono}}>
        <span>90 days ago</span><span>Today</span>
      </div>
      <div style={{display:"flex",gap:10,marginTop:6,flexWrap:"wrap"}}>
        {Object.entries(REGIME_COLORS).map(([regime,color])=>(
          <div key={regime} style={{display:"flex",alignItems:"center",gap:3}}>
            <span style={{width:7,height:7,borderRadius:2,background:color,display:"inline-block"}}/>
            <span style={{fontSize:9,color:C.faint,fontFamily:T.mono}}>{regime}</span>

}

function PortfolioProvider({children}){
  const[useCustomPortfolio,setUseCustomPortfolio]=useState(false);
  const[customPortfolio,setCustomPortfolio]=useState({
    clientName:"Sarah Mitchell",totalValue:2000000,
    holdings:[
      {ticker:"AAPL",name:"Apple Inc.",weight:14.2,assetClass:"US Equity"},
      {ticker:"MSFT",name:"Microsoft Corp.",weight:12.1,assetClass:"US Equity"},
      {ticker:"GOOGL",name:"Alphabet Inc.",weight:9.8,assetClass:"US Equity"},
      {ticker:"AMZN",name:"Amazon.com Inc.",weight:8.7,assetClass:"US Equity"},
      {ticker:"BRK-B",name:"Berkshire Hathaway",weight:7.2,assetClass:"US Equity"},
      {ticker:"TSLA",name:"Tesla Inc.",weight:6.5,assetClass:"US Equity"},
      {ticker:"VXUS",name:"Vanguard Total Intl Stock",weight:9.8,assetClass:"Intl Equity"},
      {ticker:"VNO",name:"Vanguard Real Estate ETF",weight:5.9,assetClass:"Real Estate"},
      {ticker:"GLD",name:"SPDR Gold Trust",weight:8.0,assetClass:"Commodities"},
      {ticker:"TIP",name:"iShares TIPS Bond ETF",weight:8.2,assetClass:"Fixed Income"},
      {ticker:"CASH",name:"Cash & Money Market",weight:9.6,assetClass:"Cash"}
    ]
  });
  const normalizeHoldings=(holdings,totalValue)=>(holdings||[]).map(h=>({
    ...h,
    ticker: h.ticker||h.symbol||"-",
    name: h.name||h.security_name||h.description||"-",
    assetClass: h.assetClass||h.asset_class||h.type||"Equity",
    weight: parseFloat(h.weight||h.weight_pct||h.allocation||0)||0,
    value: isFinite(h.value)&&h.value>0 ? h.value
         : isFinite(h.market_value)&&h.market_value>0 ? h.market_value
         : ((parseFloat(h.weight||h.weight_pct||h.allocation||0))/100)*(totalValue||0)
  }));

  // Normalize backend response - handles snake_case from Railway API
  const normalizePortfolio=(p)=>{
    if(!p)return null;
    const totalValue=p.totalValue||p.total_value||p.portfolio_value||2000000;
    return{
      clientName: p.clientName||p.client_name||p.name||"Sarah Mitchell",
      totalValue,
      holdings: normalizeHoldings(p.holdings||p.positions||[],totalValue)
    };
  };
  const getActivePortfolio=(backendPortfolio)=>{
    if(useCustomPortfolio)return{...customPortfolio,holdings:normalizeHoldings(customPortfolio.holdings,customPortfolio.totalValue)};
    const bp=normalizePortfolio(backendPortfolio)||{...customPortfolio,holdings:normalizeHoldings(customPortfolio.holdings,customPortfolio.totalValue)};
    return bp;
  };
  return <PortfolioContext.Provider value={{useCustomPortfolio,setUseCustomPortfolio,customPortfolio,setCustomPortfolio,getActivePortfolio}}>{children}</PortfolioContext.Provider>;
}

/*     FIX 1: DONUT CHART - sanitize + full-circle guard     */
function DonutChart({data,size=180,thickness=28,totalValue}){
  let chartData;
  if(Array.isArray(data)){chartData=data;}
  else if(data&&typeof data==='object'){chartData=Object.entries(data).map(([ticker,pct])=>({label:ticker,value:pct*(totalValue||1000000)/100}));}
  else{return<div style={{width:size,height:size,display:'flex',alignItems:'center',justifyContent:'center',background:C.borderLight,borderRadius:'50%',color:C.soft,fontSize:12}}>No data</div>;}

  chartData=chartData.filter(d=>isFinite(d.value)&&d.value>0);
  if(!chartData.length)return<div style={{width:size,height:size,display:'flex',alignItems:'center',justifyContent:'center',background:C.borderLight,borderRadius:'50%',color:C.soft,fontSize:12}}>No data</div>;

  const total=chartData.reduce((s,d)=>s+d.value,0);
  if(!total)return<div style={{width:size,height:size,display:'flex',alignItems:'center',justifyContent:'center',background:C.borderLight,borderRadius:'50%',color:C.soft,fontSize:12}}>No value</div>;

  const displayTotal=totalValue||total;
  const cx=size/2,cy=size/2,r=(size-thickness)/2;
  let cum=-90;

  const paths=chartData.map((d,i)=>{
    const pct=d.value/total,angle=pct*360;
    if(angle<0.01)return null;
    const start=cum;cum+=angle;
    if(angle>=359.99)return<circle key={i} cx={cx} cy={cy} r={r} fill="none" stroke={CHART_COLORS[i%CHART_COLORS.length]} strokeWidth={thickness} style={{opacity:0.85}}/>;
    const sr=(start*Math.PI)/180,er=(cum*Math.PI)/180;
    const x1=cx+r*Math.cos(sr),y1=cy+r*Math.sin(sr),x2=cx+r*Math.cos(er),y2=cy+r*Math.sin(er);
    if(!isFinite(x1)||!isFinite(y1)||!isFinite(x2)||!isFinite(y2))return null;
    return<path key={i} d={`M ${x1} ${y1} A ${r} ${r} 0 ${angle>180?1:0} 1 ${x2} ${y2}`} fill="none" stroke={CHART_COLORS[i%CHART_COLORS.length]} strokeWidth={thickness} strokeLinecap="round" style={{opacity:0.85}}/>;
  }).filter(Boolean);

  return(
    <svg width={size} height={size} viewBox={`0 0 ${size} ${size}`}>
      <circle cx={cx} cy={cy} r={r} fill="none" stroke={C.border} strokeWidth={thickness} opacity={0.3}/>
      {paths}
      <text x={cx} y={cy-6} textAnchor="middle" fill={C.navy} fontFamily={T.display} fontSize={17} fontWeight={600}>${(displayTotal/1e6).toFixed(1)}M</text>
      <text x={cx} y={cy+12} textAnchor="middle" fill={C.soft} fontFamily={T.body} fontSize={10}>Total Value</text>
    </svg>
  );
}

function OptimizerResult({data,regimeAdjustment}){
  const{getActivePortfolio}=usePortfolio();
  if(!data)return null;
  const portfolioValue=getActivePortfolio()?.totalValue||2000000;
  const isRegimeAware=!!regimeAdjustment;
  const currentWeights=data.current_weights||{};
  const targetWeights=data.target_weights||{};
  const allocation=data.allocation||targetWeights;
  const turnover=Object.keys({...currentWeights,...targetWeights}).reduce((sum,t)=>sum+Math.abs((targetWeights[t]||0)-(currentWeights[t]||0)),0)/2;
  const metrics=[
    {label:"Holdings Count",value:Object.keys(allocation).length.toString(),color:C.blue,regime:null},
    {label:"Portfolio Turnover",value:`${(turnover*100).toFixed(1)}%`,color:C.gold,regime:null},
    {label:"Expected Return",value:"8.7%",sub:"Annualized",color:C.green,regime:isRegimeAware&&regimeAdjustment?{color:regimeAdjustment.regime==='expansion'?C.green:C.gold,impact:((regimeAdjustment.return_impact||0)*100).toFixed(1)}:null},
    {label:"Risk (Vol)",value:"11.2%",sub:"Annualized",color:C.red,regime:null}
  ];
  return(
    <div style={{animation:"fadeUp 0.4s ease"}}>
      <h3 style={{fontSize:18,fontWeight:600,color:C.navy,marginBottom:4,fontFamily:T.display}}>Optimization Results</h3>
      {isRegimeAware&&<div style={{fontSize:12,color:regimeAdjustment?.regime==='expansion'?C.green:C.gold,fontWeight:500,marginBottom:20}}>Regime-Optimized ({regimeAdjustment?.regime?.toUpperCase()} constraints)</div>}
      <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(180px,1fr))",gap:16,marginBottom:32}}>
        {metrics.map((m,i)=><MetricCard key={i} {...m}/>)}
      </div>
      {Object.keys(currentWeights).length>0&&Object.keys(targetWeights).length>0?(
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:32,marginBottom:24}}>
          <div>
            <h4 style={{fontSize:14,fontWeight:600,color:C.soft,marginBottom:16,textTransform:"uppercase",letterSpacing:"0.08em"}}>Current Allocation</h4>
            <div style={{display:"grid",gridTemplateColumns:"200px 1fr",gap:16}}>
              <DonutChart data={Object.entries(currentWeights).map(([k,v])=>({label:k,value:(v/100)*portfolioValue}))} totalValue={portfolioValue}/>
              <HBarChart data={Object.entries(currentWeights).map(([k,v])=>({label:k,value:v,display:`${v.toFixed(1)}%`}))}/>
            </div>
          </div>
          <div>
            <h4 style={{fontSize:14,fontWeight:600,color:isRegimeAware?C.green:C.navy,marginBottom:16,textTransform:"uppercase",letterSpacing:"0.08em"}}>{isRegimeAware?"Regime-Optimized":"Target Allocation"}</h4>
            <div style={{display:"grid",gridTemplateColumns:"200px 1fr",gap:16}}>
              <DonutChart data={Object.entries(targetWeights).map(([k,v])=>({label:k,value:(v/100)*portfolioValue}))} totalValue={portfolioValue}/>
              <HBarChart data={Object.entries(targetWeights).map(([k,v])=>({label:k,value:v,display:`${v.toFixed(1)}%`}))}/>
            </div>
          </div>
        </div>
      ):(
        <div style={{display:"grid",gridTemplateColumns:"300px 1fr",gap:24,marginBottom:24}}>
          <DonutChart data={Object.entries(allocation).map(([k,v])=>({label:k,value:(v/100)*portfolioValue}))} totalValue={portfolioValue}/>
          <HBarChart data={Object.entries(allocation).map(([k,v])=>({label:k,value:v,display:`${v.toFixed(1)}%`}))}/>

function SmartResult({data,regimeAdjustment}){
  if(!data)return null;
  if(typeof data==="object"&&(data.scenario||data.impact||data.portfolio_impact))return<ScenarioResult data={data} regimeAdjustment={regimeAdjustment}/>;
  if(typeof data==="object"&&(data.metrics||data.cumulative_returns))return<BacktestResult data={data} regimeAdjustment={regimeAdjustment}/>;
  if(typeof data==="object"&&(data.portfolio_vol!==undefined||data.factors))return<AnalyticsResult data={data} regimeAdjustment={regimeAdjustment}/>;
  if(typeof data==="object"&&(data.current_weights||data.target_weights||data.allocation))return<OptimizerResult data={data} regimeAdjustment={regimeAdjustment}/>;
  if(Array.isArray(data))return<DataTable headers={["Metric","Value"]} rows={data.map(d=>[d.label||d.name||"-",d.value||"-"])}/>;
  if(typeof data==="object")return<pre style={{fontSize:12,fontFamily:T.mono,background:C.borderLight,padding:12,borderRadius:6,overflow:"auto",maxHeight:300}}>{JSON.stringify(data,null,2)}</pre>;
  return<div style={{fontSize:13,color:C.navy}}>{String(data)}</div>;
}

const RiskProfileContext = createContext();
const useRiskProfile = () => useContext(RiskProfileContext);

const DEFAULT_PROFILE = {
  risk_tolerance: "moderate",   // conservative | moderate | aggressive
  horizon: "medium",            // short | medium | long
  objective: "balanced",        // preservation | income | balanced | growth | maximum_growth
  name: "Sarah Mitchell",
  aum: 2000000,
  completed: false,
};

// Multiplier table: [regime][tolerance] -> equity signal adjustment
// Values: -2 = max underweight, -1 = underweight, 0 = neutral, 1 = overweight, 2 = max overweight
const REGIME_PROFILE_MATRIX = {
  SURGE:    { conservative: 0.55, moderate: 0.80, aggressive: 1.00 },
  CRUISE:   { conservative: 0.60, moderate: 0.82, aggressive: 1.00 },
  PRESSURE: { conservative: 0.40, moderate: 0.65, aggressive: 0.90 },
  SLIDE:    { conservative: 0.30, moderate: 0.55, aggressive: 0.80 },
  SHOCK:    { conservative: 0.10, moderate: 0.30, aggressive: 0.55 },
  FOG:      { conservative: 0.45, moderate: 0.65, aggressive: 0.85 },
};

// Horizon modifier on top of tolerance
const HORIZON_MOD = { short: -0.10, medium: 0.00, long: 0.08 };

function getProfileMultiplier(regime, profile) {
  const base = REGIME_PROFILE_MATRIX[regime]?.[profile.risk_tolerance] ?? 0.65;
  const horizonAdj = HORIZON_MOD[profile.horizon] ?? 0;
  return Math.min(1.0, Math.max(0.05, base + horizonAdj));
}

function getProfileSignal(baseSignal, multiplier) {
  const signalMap = {
    "MAX OVERWEIGHT":  [null, "UNDERWEIGHT", "NEUTRAL", "OVERWEIGHT", "OVERWEIGHT", "MAX OVERWEIGHT"],
    "OVERWEIGHT":      [null, "UNDERWEIGHT", "NEUTRAL", "NEUTRAL", "OVERWEIGHT", "OVERWEIGHT"],
    "NEUTRAL":         [null, "UNDERWEIGHT", "NEUTRAL", "NEUTRAL", "NEUTRAL", "OVERWEIGHT"],
    "FLOOR":           [null, "FLOOR", "FLOOR", "FLOOR", "FLOOR", "FLOOR"],
    "ELEVATED":        [null, "MAXIMUM", "ELEVATED", "ELEVATED", "ELEVATED", "FLOOR"],
    "MAX UNDERWEIGHT": [null, "MAX UNDERWEIGHT", "MAX UNDERWEIGHT", "UNDERWEIGHT", "UNDERWEIGHT", "NEUTRAL"],
    "UNDERWEIGHT":     [null, "MAX UNDERWEIGHT", "UNDERWEIGHT", "UNDERWEIGHT", "NEUTRAL", "NEUTRAL"],
    "MAXIMUM":         [null, "MAXIMUM", "MAXIMUM", "ELEVATED", "ELEVATED", "ELEVATED"],
  };
  const idx = Math.round(multiplier * 5); // 0-5
  return signalMap[baseSignal]?.[idx] ?? baseSignal;
}

function RiskProfileProvider({ children }) {
  const [profile, setProfileState] = useState(() => {
    try {
      const saved = localStorage.getItem("grineos_risk_profile");
      return saved ? { ...DEFAULT_PROFILE, ...JSON.parse(saved) } : DEFAULT_PROFILE;
    } catch { return DEFAULT_PROFILE; }
  });

  const setProfile = (updates) => {
    const next = { ...profile, ...updates };
    setProfileState(next);
    try { localStorage.setItem("grineos_risk_profile", JSON.stringify(next)); } catch {}
  };

  const resetProfile = () => {
    setProfileState(DEFAULT_PROFILE);
    try { localStorage.removeItem("grineos_risk_profile"); } catch {}
  };

  return (
    <RiskProfileContext.Provider value={{ profile, setProfile, resetProfile }}>
      {children}
    </RiskProfileContext.Provider>
  );
}

function ExposureMapPanel() {
  const { regimeConfig } = useRegime();
  const { profile } = useRiskProfile();
  const exposure = regimeConfig.exposure;
  if (!exposure || !exposure.rows) return <div style={{ color: C.soft, fontSize: 13, padding: 16, background: C.borderLight, borderRadius: 8 }}>Loading live exposure map </div>;

  const mult = getProfileMultiplier(regimeConfig.label, profile);
  const sigColors = { "MAX OVERWEIGHT": C.green, "OVERWEIGHT": "#22c55e", "NEUTRAL": C.soft, "FLOOR": C.gold, "ELEVATED": C.gold, "UNDERWEIGHT": "#f97316", "MAX UNDERWEIGHT": C.red, "MAXIMUM": C.red };
  const dirText = { "up2": "  ", "up": " ", "--": "-", "dn": " ", "dn2": "  " };

  const profileLabel = profile.risk_tolerance.charAt(0).toUpperCase() + profile.risk_tolerance.slice(1);

  return (
    <div>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 10 }}>
        <h3 style={{ fontSize: 13, fontWeight: 600, color: C.navy, textTransform: "uppercase", letterSpacing: "0.08em" }}>Live Exposure Map</h3>
        <div style={{ display: "flex", gap: 6 }}>

          <span style={{ fontSize: 10, padding: "3px 8px", borderRadius: 4, background: C.accentLight, color: C.navy, fontWeight: 600, fontFamily: T.mono }}>{profileLabel} . {(mult * 100).toFixed(0)}%</span>
        </div>
      </div>
      <div style={{ background: C.white, border: `1px solid ${C.border}`, borderRadius: 8, overflow: "hidden" }}>
        <div style={{ display: "grid", gridTemplateColumns: "1.8fr 1.4fr 1.4fr 0.5fr 0.8fr", background: C.navy, padding: "9px 14px" }}>
          {["Asset Class", "Base Signal", "Your Signal", "Dir", "Conf"].map((h, i) => (
            <div key={i} style={{ fontSize: 9, fontWeight: 600, color: "rgba(255,255,255,0.6)", textTransform: "uppercase", letterSpacing: "0.08em" }}>{h}</div>
          ))}

            <div key={i} style={{ display: "grid", gridTemplateColumns: "1.8fr 1.4fr 1.4fr 0.5fr 0.8fr", padding: "9px 14px", borderBottom: i < exposure.rows.length - 1 ? `1px solid ${C.borderLight}` : "none", background: i % 2 === 0 ? C.white : "#fafbfc" }}>

              <div style={{ fontSize: 11, color: C.faint, fontFamily: T.mono }}>{row.signal}</div>
              <div style={{ fontSize: 11, fontWeight: 700, color: sigColors[adjSignal] || C.soft, fontFamily: T.mono, display: "flex", alignItems: "center", gap: 4 }}>
                {adjSignal}
                {changed && <span style={{ fontSize: 9, color: C.gold }}> </span>}
              </div>
              <div style={{ fontSize: 13, fontWeight: 700, color: sigColors[adjSignal] || C.soft }}>{dirText[row.direction] || row.direction}</div>
              <div style={{ fontSize: 11, fontFamily: T.mono, color: C.navy, fontWeight: 600 }}>{(row.confidence * mult).toFixed(0)}%</div>
            </div>
          );
        })}
      </div>
      {regimeConfig.narrative && (
        <div style={{ marginTop: 10, padding: "9px 12px", borderRadius: 6, background: regimeConfig.bgColor, border: `1px solid ${regimeConfig.color}33`, fontSize: 11, fontStyle: "italic", color: C.navy, lineHeight: 1.5 }}>

function AgentTab({token,demoP}){
  const[messages,setMessages]=useState([]);
  const[input,setInput]=useState("");
  const[loading,setLoading]=useState(false);
  const{regimeConfig}=useRegime();
  const{getActivePortfolio}=usePortfolio();
  const{profile}=useRiskProfile();

  const sendMessage=async()=>{
    if(!input.trim()||loading)return;
    const userMsg={role:"user",content:input};
    setMessages(prev=>[...prev,userMsg]);
    const q=input;setInput("");setLoading(true);
    try{
      const portfolio=getActivePortfolio(demoP);
      const holdingsSummary=portfolio?.holdings?.slice(0,8).map(h=>`${h.ticker} ${(h.weight||0).toFixed(1)}%`).join(", ")||"";
      const res=await fetch(`${ENGINE_A}/agent/chat`,{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({
          message:q,
          history:messages.filter(m=>m.role==="user"||m.role==="assistant").slice(-6).map(m=>({role:m.role,content:m.content})),
          portfolio_summary:portfolio?`${portfolio.clientName} $${((portfolio.totalValue||0)/1e6).toFixed(2)}M | Holdings: ${holdingsSummary} | Risk: ${profile.risk_tolerance}/${profile.horizon} horizon/${profile.objective}`:`Demo $2M | Risk: ${profile.risk_tolerance}/${profile.horizon}/${profile.objective}`
        })
      });
      const data=await res.json();
      if(!res.ok)throw new Error(data.detail||"Agent error");
      const reply=data.response||"No response.";
      setMessages(prev=>[...prev,{role:"assistant",content:reply}]);
    }catch(e){
      setMessages(prev=>[...prev,{role:"assistant",content:`Error: ${e.message}`}]);
    }finally{setLoading(false);}
  };

  const suggestions=["What should I do with my portfolio in this regime?","Is now a good time to add equity risk?","What's the biggest threat to this regime continuing?","How should I position for a regime change?","Explain the current market drivers"];

  return(
    <div style={{padding:"32px 40px",maxWidth:1000,animation:"fadeUp .4s ease",height:"calc(100vh - 200px)",display:"flex",flexDirection:"column"}}>
      <div style={{marginBottom:24,borderBottom:`1px solid ${C.border}`,paddingBottom:16}}>
        <h2 style={{fontFamily:T.display,fontSize:26,fontWeight:600,color:C.navy,fontStyle:"italic"}}>Grine</h2>

            {regimeConfig.label} . {regimeConfig.confidence?.toFixed(0)||"-"}% confidence . {regimeConfig.instinct?.split(".")[0]}
          </span>
        </div>
      </div>

      <div style={{flex:1,overflowY:"auto",marginBottom:16}}>
        {messages.length===0?(
          <div>
            <div style={{color:C.faint,textAlign:"center",fontStyle:"italic",marginBottom:24,marginTop:20}}>
              Ask me anything about your portfolio - I have live regime context from Engine A.

            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
              {suggestions.map((s,i)=>(
                <button key={i} onClick={()=>setInput(s)} style={{...btnOutline,textAlign:"left",padding:"10px 14px",fontSize:13,fontWeight:400,color:C.navy,borderColor:C.border,lineHeight:1.4}}>{s}</button>
              ))}
            </div>
          </div>
        ):messages.map((msg,i)=>{
          const isUser=msg.role==="user";
          // Parse Grine response into labelled sections
          const parseGrine=(text)=>{
            const sections=[];
            const parts=text.split(/\*\*([^*]+):\*\*/g);
            if(parts.length<=1)return<div style={{fontSize:14,lineHeight:1.65,color:C.navy,whiteSpace:"pre-wrap"}}>{text}</div>;
            // parts: ["pre", "LABEL", "content", "LABEL", "content", ...]
            if(parts[0].trim())sections.push({label:null,content:parts[0].trim()});
            for(let j=1;j<parts.length;j+=2){
              sections.push({label:parts[j],content:(parts[j+1]||"").trim()});
            }
            return(
              <div style={{display:"flex",flexDirection:"column",gap:10}}>
                {sections.map((s,k)=>(
                  <div key={k}>
                    {s.label&&(
                      <div style={{fontSize:9,fontWeight:700,letterSpacing:"0.12em",color:regimeConfig.color,textTransform:"uppercase",fontFamily:T.mono,marginBottom:3}}>{s.label}</div>

                  </div>
                ))}
              </div>
            );
          };
          return(
            <div key={i} style={{display:"flex",flexDirection:"column",alignItems:isUser?"flex-end":"flex-start",marginBottom:16,animation:`slideIn 0.25s ease ${i*0.03}s both`}}>
              <div style={{fontSize:10,color:C.faint,textTransform:"uppercase",letterSpacing:"0.1em",marginBottom:4,fontFamily:T.mono,paddingLeft:isUser?0:2,paddingRight:isUser?2:0}}>
                {isUser?"You":"Grine"}
              </div>
              <div style={{
                maxWidth:"72%",
                padding:isUser?"11px 16px":"16px 20px",
                borderRadius:isUser?"18px 18px 4px 18px":"4px 18px 18px 18px",
                background:isUser?C.navy2:C.white,
                border:isUser?"none":`1px solid ${C.border}`,
                boxShadow:isUser?"0 2px 8px rgba(26,35,50,0.18)":"0 1px 4px rgba(0,0,0,0.06)"
              }}>
                {isUser
                  ?<div style={{fontSize:14,lineHeight:1.55,color:"#ffffff",fontWeight:500}}>{msg.content}</div>
                  :parseGrine(msg.content)
                }
              </div>
            </div>
          );
        })}
        {loading&&(

function PerfChart({data,color,height=160}){
  color=color||"#2563eb";
  if(!data||data.length<2)return<div style={{height,display:"flex",alignItems:"center",justifyContent:"center",background:"#f1f5f9",borderRadius:6,color:"#64748b",fontSize:13}}>No performance data</div>;
  const W=600,H=height,pad=24;
  const vals=data.map(d=>typeof d==="object"?d.value:d);
  const minV=Math.min(...vals),maxV=Math.max(...vals),range=maxV-minV||0.01;
  const pts=vals.map((v,i)=>`${pad+(i/(vals.length-1))*(W-pad*2)},${H-pad-((v-minV)/range)*(H-pad*2)}`).join(" ");
  const area=`${pts} ${W-pad},${H-pad} ${pad},${H-pad}`;
  return(
    <svg width="100%" height={H} viewBox={`0 0 ${W} ${H}`} style={{display:"block"}}>
      <defs><linearGradient id="pg" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stopColor={color} stopOpacity="0.12"/><stop offset="100%" stopColor={color} stopOpacity="0"/></linearGradient></defs>
      <polygon points={area} fill="url(#pg)"/>
      <polyline points={pts} fill="none" stroke={color} strokeWidth={2} strokeLinejoin="round"/>
      {minV<0&&maxV>0&&<line x1={pad} x2={W-pad} y1={H-pad-((0-minV)/range)*(H-pad*2)} y2={H-pad-((0-minV)/range)*(H-pad*2)} stroke="#e2e8f0" strokeWidth={1} strokeDasharray="4,3"/>}
      <text x={pad} y={14} fill="#64748b" fontSize={10} fontFamily="IBM Plex Mono,monospace">{maxV>0?"+":""}{(maxV*100).toFixed(1)}%</text>
      <text x={pad} y={H-6} fill="#64748b" fontSize={10} fontFamily="IBM Plex Mono,monospace">{minV>0?"+":""}{(minV*100).toFixed(1)}%</text>
    </svg>
  );
}

  return(
    <div style={{minHeight:"100vh",background:C.bg,fontFamily:T.body,color:C.navy,display:"flex",flexDirection:"column"}}>
      <header style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"14px 32px",borderBottom:`1px solid ${C.border}`,background:C.white,flexShrink:0}}>
        <div style={{display:"flex",alignItems:"center",gap:12}}>
          <span style={{fontFamily:T.display,fontSize:22,fontWeight:700,color:C.navy,letterSpacing:"-0.02em"}}>GrineOS</span>
          <span style={{fontSize:12,color:C.soft}}>Regime-Driven Allocation Intelligence</span>
        </div>
        <div style={{display:"flex",alignItems:"center",gap:16}}>
          <button onClick={()=>setRegimeSidebarOpen(!regimeSidebarOpen)} style={{...btnOutline,padding:"6px 14px",fontSize:11,display:'flex',alignItems:'center',gap:6}}>
            <span style={{fontSize:12}}> </span>Regime Intel
          </button>
          <button onClick={()=>setTab("profile")} style={{...btnOutline,padding:"6px 12px",fontSize:11,display:'flex',alignItems:'center',gap:6,borderColor:C.border}}>
            <span style={{fontSize:14}}>
              {profile.risk_tolerance==="conservative"?" ":profile.risk_tolerance==="aggressive"?" ":"  "}
            </span>
            <span style={{fontFamily:T.mono,fontSize:10,color:C.soft}}>
              {profile.risk_tolerance.charAt(0).toUpperCase()+profile.risk_tolerance.slice(1)} . {profile.horizon.charAt(0).toUpperCase()+profile.horizon.slice(1)}
            </span>
          </button>
          <span style={{fontSize:12,color:C.soft}}>KG&Co Capital Advisory . London . New York</span>
          <div style={{width:1,height:16,background:C.border}}/>
          <span style={{fontSize:12,color:C.faint}}>{userEmail}</span>
          <button onClick={onLogout} style={{...btnOutline,padding:"6px 14px",fontSize:11,color:C.red,borderColor:C.red+"44"}}>Sign Out</button>
        </div>
      </header>
      <RegimeTopBar/>
      <nav style={{display:"flex",gap:0,borderBottom:`1px solid ${C.border}`,background:C.white,paddingLeft:32,flexShrink:0}}>
        {TABS.map(t=><button key={t.id} onClick={()=>setTab(t.id)} style={{padding:"12px 20px",border:"none",borderBottom:tab===t.id?`2px solid ${C.navy}`:"2px solid transparent",background:"transparent",color:tab===t.id?C.navy:C.soft,fontFamily:T.body,fontSize:13,fontWeight:tab===t.id?600:400,cursor:"pointer",transition:"all .15s"}}>{t.label}</button>)}
      </nav>
      <main style={{flex:1,overflow:"auto",position:'relative'}}>{content}</main>
      <RegimeAnalysisSidebar isOpen={regimeSidebarOpen} onToggle={()=>setRegimeSidebarOpen(false)}/>
      <footer style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"8px 32px",borderTop:`1px solid ${C.border}`,background:C.white,fontSize:11,color:C.faint,flexShrink:0}}>
        <div style={{display:"flex",alignItems:"center",gap:12}}>
          <div style={{display:"flex",alignItems:"center"}}><Dot ok={health?.status==="healthy"||health?.status==="ok"}/>API <Tag color={health?.status==="healthy"||health?.status==="ok"?C.green:C.red}>{health?.status||"..."}</Tag></div>
          <div style={{display:"flex",alignItems:"center"}}><Dot ok={!engineError}/>Engine A <Tag color={engineError?C.red:C.green}>{engineError?"offline":"live"}</Tag></div>
          {lastUpdated&&<div style={{fontSize:10,color:C.faint}}>Updated {lastUpdated.toLocaleTimeString()}</div>}
        </div>
        <div>Grine Technologies Ltd . A KG&Co Company</div>
      </footer>
    </div>
  );
}

function App(){
  const[token,setToken]=useState(null);
  const[email,setEmail]=useState("");
  const[showLanding,setShowLanding]=useState(true);

  if(showLanding&&!token){
    return(
      <RegimeProvider><RiskProfileProvider><PortfolioProvider>
        <EducationalLanding onEnterPlatform={()=>setShowLanding(false)}/>
      </PortfolioProvider></RiskProfileProvider></RegimeProvider>
    );
  }
  return(
    <RegimeProvider><RiskProfileProvider><PortfolioProvider>
      {token
        ?<Dashboard token={token} userEmail={email} onLogout={()=>{setToken(null);setEmail("");setShowLanding(true);}}/>
        :<AuthScreen onAuth={(t,e)=>{setToken(t);setEmail(e);}}/>
      }
    </PortfolioProvider></RiskProfileProvider></RegimeProvider>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
