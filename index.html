const {useState,useEffect,useRef,useCallback}=React;

const API="https://grine-platform-production.up.railway.app";

const T={display:"'Source Serif 4',Georgia,serif",body:"'DM Sans',sans-serif",mono:"'IBM Plex Mono',monospace"};
const C={bg:"#f8f9fb",white:"#ffffff",surface:"#ffffff",navy:"#1a2332",navyLight:"#2d3a4a",slate:"#475569",soft:"#64748b",faint:"#94a3b8",border:"#e2e8f0",borderLight:"#f1f5f9",accent:"#1a2332",accentLight:"rgba(26,35,50,0.06)",green:"#16a34a",greenBg:"rgba(22,163,74,0.06)",red:"#dc2626",redBg:"rgba(220,38,38,0.06)",blue:"#2563eb",blueBg:"rgba(37,99,235,0.06)",gold:"#b45309",goldBg:"rgba(180,83,9,0.06)",text:"#1a2332",textSoft:"#475569"};
const CHART_COLORS=["#1a2332","#2563eb","#16a34a","#b45309","#7c3aed","#dc2626","#0891b2","#c026d3","#ea580c","#64748b"];

const inp={width:"100%",padding:"11px 14px",borderRadius:6,border:`1px solid ${C.border}`,background:C.white,color:C.navy,fontFamily:T.body,fontSize:14,outline:"none",transition:"all .2s"};
const btnB={padding:"10px 22px",borderRadius:6,border:"none",fontFamily:T.body,fontSize:13,fontWeight:600,cursor:"pointer",transition:"all .15s"};

const lbl={display:"block",fontSize:11,fontWeight:600,color:C.soft,textTransform:"uppercase",letterSpacing:"0.08em",marginBottom:6};
const eBox={marginTop:16,padding:"12px 16px",borderRadius:8,background:C.redBg,border:`1px solid ${C.red}22`,color:C.red,fontSize:13};

const apiFetch=async(path,token,opts={})=>{
  const h={"Content-Type":"application/json",...(token?{Authorization:`Bearer ${token}`}:{}),...(opts.headers||{})};
  const r=await fetch(`${API}${path}`,{...opts,headers:h});
  const d=await r.json();
  if(!r.ok)throw new Error(typeof d.detail==="string"?d.detail:JSON.stringify(d.detail||d));
  return d;
};

const Spin=({size=14,dark})=>React.createElement("span",{style:{display:"inline-block",width:size,height:size,border:`2px solid ${dark?C.border:"rgba(255,255,255,0.3)"}`,borderTopColor:dark?C.navy:"#fff",borderRadius:"50%",animation:"spin .6s linear infinite",marginRight:6,verticalAlign:"middle"}});
const Dot=({ok})=>React.createElement("span",{style:{display:"inline-block",width:7,height:7,borderRadius:"50%",background:ok?C.green:C.red,marginRight:8}});
const Tag=({children,color=C.navy})=>React.createElement("span",{style:{display:"inline-block",padding:"3px 10px",borderRadius:4,fontSize:10,fontWeight:600,letterSpacing:"0.06em",background:`${color}10`,color,fontFamily:T.mono,textTransform:"uppercase"}},children);

/* ═══ CHARTS ═══ */
function DonutChart({data,size=180,thickness=28}){
  const total=data.reduce((s,d)=>s+d.value,0);
  if(total===0)return null;
  const cx=size/2,cy=size/2,r=(size-thickness)/2;
  let cum=-90;
  const paths=data.map((d,i)=>{
    const pct=d.value/total,angle=pct*360,start=cum;cum+=angle;
    const sr=(start*Math.PI)/180,er=(cum*Math.PI)/180;
    const x1=cx+r*Math.cos(sr),y1=cy+r*Math.sin(sr),x2=cx+r*Math.cos(er),y2=cy+r*Math.sin(er);
    return React.createElement("path",{key:i,d:`M ${x1} ${y1} A ${r} ${r} 0 ${angle>180?1:0} 1 ${x2} ${y2}`,fill:"none",stroke:CHART_COLORS[i%CHART_COLORS.length],strokeWidth:thickness,strokeLinecap:"round",style:{opacity:0.85}});
  });
  return React.createElement("svg",{width:size,height:size,viewBox:`0 0 ${size} ${size}`},
    React.createElement("circle",{cx,cy,r,fill:"none",stroke:C.border,strokeWidth:thickness,opacity:0.3}),
    ...paths,
    React.createElement("text",{x:cx,y:cy-6,textAnchor:"middle",fill:C.navy,fontFamily:T.display,fontSize:17,fontWeight:600},"$"+(total/1e6).toFixed(1)+"M"),
    React.createElement("text",{x:cx,y:cy+12,textAnchor:"middle",fill:C.soft,fontFamily:T.body,fontSize:10},"Total Value")
  );
}

function HBarChart({data}){
  const maxVal=Math.max(...data.map(d=>Math.abs(d.value)),0.01);
  return React.createElement("div",{style:{display:"flex",flexDirection:"column",gap:10}},
    data.map((d,i)=>{
      const pct=Math.abs(d.value)/maxVal*100,isNeg=d.value<0,color=d.color||CHART_COLORS[i%CHART_COLORS.length];
      return React.createElement("div",{key:i,style:{animation:`fadeUp 0.3s ease ${i*0.04}s both`}},
        React.createElement("div",{style:{display:"flex",justifyContent:"space-between",marginBottom:3}},
          React.createElement("span",{style:{fontSize:13,color:C.navy,fontWeight:500}},d.label),
          React.createElement("span",{style:{fontSize:13,fontFamily:T.mono,color:isNeg?C.red:C.navy,fontWeight:600}},typeof d.display==="string"?d.display:(d.value>=0?"+":"")+d.value.toFixed(2)+"%")
        ),
        React.createElement("div",{style:{height:5,background:C.borderLight,borderRadius:3,overflow:"hidden"}},
          React.createElement("div",{style:{height:"100%",width:`${pct}%`,background:isNeg?C.red:color,borderRadius:3,transition:"width 0.8s ease"}})
        )
      );
    })
  );
}

function MetricCard({label,value,sub,color=C.navy}){
  return React.createElement("div",{style:{background:C.white,borderRadius:8,border:`1px solid ${C.border}`,padding:"18px 16px",position:"relative"}},
    React.createElement("div",{style:{position:"absolute",top:0,left:0,width:3,height:"100%",background:color,borderRadius:"3px 0 0 3px"}}),
    React.createElement("div",{style:{fontSize:11,color:C.soft,textTransform:"uppercase",letterSpacing:"0.06em",fontWeight:600,marginBottom:6}},label),
    React.createElement("div",{style:{fontSize:22,fontFamily:T.display,fontWeight:600,color,letterSpacing:"-0.02em"}},value),
    sub&&React.createElement("div",{style:{fontSize:11,color:C.faint,marginTop:3}},sub)
  );
}

function DataTable({headers,rows}){
  return React.createElement("div",{style:{overflowX:"auto",borderRadius:8,border:`1px solid ${C.border}`,background:C.white}},
    React.createElement("table",{style:{width:"100%",borderCollapse:"collapse",fontSize:13}},
      React.createElement("thead",null,
        React.createElement("tr",null,
          headers.map((h,i)=>React.createElement("th",{key:i,style:{padding:"12px 16px",textAlign:i===0?"left":"right",borderBottom:`1px solid ${C.border}`,background:C.borderLight,color:C.soft,fontSize:11,fontWeight:600,textTransform:"uppercase",letterSpacing:"0.06em",fontFamily:T.mono}},h))
        )
      ),
      React.createElement("tbody",null,
        rows.map((row,i)=>React.createElement("tr",{key:i},
          row.map((cell,j)=>React.createElement("td",{key:j,style:{padding:"11px 16px",textAlign:j===0?"left":"right",color:j===0?C.navy:C.slate,fontFamily:j>2?T.mono:T.body,fontSize:13,borderBottom:i<rows.length-1?`1px solid ${C.borderLight}`:"none"}},cell))
        ))
      )
    )
  );
}

/* ═══ SMART RESULT ═══ */
function SmartResult({data}){
  if(!data)return null;
  const sections=[];const keys=Object.keys(data);
  const metrics=[];
  const mKeys=["expected_return","annual_return","annualized_return","total_return","sharpe_ratio","sharpe","volatility","annual_volatility","annualized_volatility","max_drawdown","sortino_ratio","sortino","calmar_ratio","beta","alpha","var_95","cvar_95","portfolio_return","portfolio_volatility","portfolio_value","total_value"];
  const mLabels={"expected_return":"Expected Return","annual_return":"Annual Return","annualized_return":"Ann. Return","total_return":"Total Return","sharpe_ratio":"Sharpe Ratio","sharpe":"Sharpe","volatility":"Volatility","annual_volatility":"Ann. Volatility","annualized_volatility":"Ann. Volatility","max_drawdown":"Max Drawdown","sortino_ratio":"Sortino","sortino":"Sortino","calmar_ratio":"Calmar","beta":"Beta","alpha":"Alpha","var_95":"VaR 95%","cvar_95":"CVaR 95%","portfolio_return":"Return","portfolio_volatility":"Volatility","portfolio_value":"Value","total_value":"Total Value"};
  const mColors={"expected_return":C.green,"annual_return":C.green,"total_return":C.green,"sharpe_ratio":C.blue,"sharpe":C.blue,"volatility":C.gold,"max_drawdown":C.red,"var_95":C.red,"cvar_95":C.red};

  const flat={...data};
  ["metrics","summary","statistics","performance","risk","risk_metrics","portfolio_metrics"].forEach(k=>{
    if(flat[k]&&typeof flat[k]==="object"&&!Array.isArray(flat[k]))Object.entries(flat[k]).forEach(([mk,mv])=>{if(!flat[mk])flat[mk]=mv});
  });
  mKeys.forEach(k=>{
    if(flat[k]!==undefined&&typeof flat[k]==="number"){
      const isPct=k.includes("return")||k.includes("volatility")||k.includes("drawdown")||k.includes("var")||k.includes("alpha");
      const isDollar=k.includes("value");
      let display;
      if(isDollar)display="$"+(flat[k]/1e6>=1?(flat[k]/1e6).toFixed(2)+"M":flat[k].toLocaleString());
      else if(isPct)display=(flat[k]*100<100&&flat[k]*100>-100?(flat[k]*100).toFixed(2):flat[k].toFixed(2))+"%";
      else display=flat[k].toFixed(3);
      metrics.push({label:mLabels[k]||k.replace(/_/g," "),value:display,color:mColors[k]||C.navy});
    }
  });
  if(metrics.length>0)sections.push(React.createElement("div",{key:"m",style:{marginBottom:28}},
    React.createElement("h3",{style:{fontFamily:T.display,fontSize:17,fontWeight:600,marginBottom:14,color:C.navy}},"Key Metrics"),
    React.createElement("div",{style:{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(170px,1fr))",gap:10}},metrics.map((m,i)=>React.createElement(MetricCard,{key:i,...m})))
  ));

  const wKey=keys.find(k=>k==="weights"||k==="allocations"||k==="optimal_weights"||k==="target_weights");
  if(wKey&&typeof data[wKey]==="object"&&!Array.isArray(data[wKey])){
    const entries=Object.entries(data[wKey]).sort((a,b)=>b[1]-a[1]);
    const donutData=entries.map(([k,v])=>({label:k,value:Math.abs(v)}));
    const barData=entries.map(([k,v],i)=>({label:k,value:v*100,display:(v*100).toFixed(1)+"%",color:CHART_COLORS[i%CHART_COLORS.length]}));
    sections.push(React.createElement("div",{key:"w",style:{marginBottom:28}},
      React.createElement("h3",{style:{fontFamily:T.display,fontSize:17,fontWeight:600,marginBottom:14,color:C.navy}},"Optimal Allocation"),
      React.createElement("div",{style:{display:"flex",gap:32,flexWrap:"wrap",alignItems:"flex-start"}},
        React.createElement("div",{style:{background:C.white,borderRadius:8,border:`1px solid ${C.border}`,padding:24,display:"flex",flexDirection:"column",alignItems:"center"}},
          React.createElement(DonutChart,{data:donutData}),
          React.createElement("div",{style:{display:"flex",flexWrap:"wrap",gap:8,marginTop:14,justifyContent:"center"}},
            donutData.map((d,i)=>React.createElement("div",{key:i,style:{display:"flex",alignItems:"center",gap:4,fontSize:11,color:C.slate}},
              React.createElement("span",{style:{width:8,height:8,borderRadius:2,background:CHART_COLORS[i%CHART_COLORS.length]}}),d.label
            ))
          )
        ),
        React.createElement("div",{style:{flex:1,minWidth:250}},React.createElement(HBarChart,{data:barData}))
      )
    ));
  }

  const hKey=keys.find(k=>k==="holdings"||k==="positions");
  if(hKey&&Array.isArray(data[hKey])&&data[hKey].length>0){
    const h=data[hKey],total=h.reduce((s,x)=>s+(x.value||0),0);
    sections.push(React.createElement("div",{key:"h",style:{marginBottom:28}},
      React.createElement("h3",{style:{fontFamily:T.display,fontSize:17,fontWeight:600,marginBottom:14,color:C.navy}},"Holdings"),
      React.createElement(DataTable,{headers:["Ticker","Name","Asset Class","Value","Weight"],rows:h.map(x=>[x.ticker||"-",x.name||"-",(x.asset_class||"").replace(/_/g," "),"$"+(x.value||0).toLocaleString(),total>0?((x.value/total)*100).toFixed(1)+"%":"—"])})
    ));
  }

  const iKey=keys.find(k=>k==="impacts"||k==="asset_impacts"||k==="results"||k==="scenario_results");
  if(iKey&&typeof data[iKey]==="object"){
    const imp=data[iKey];
    let barData;
    if(Array.isArray(imp))barData=imp.map((x,i)=>({label:x.name||x.ticker||`Item ${i}`,value:(x.impact||x.return||0)*100}));
    else barData=Object.entries(imp).map(([k,v])=>({label:k,value:(typeof v==="number"?v:v?.impact||v?.return||0)*100}));
    if(barData.length>0)sections.push(React.createElement("div",{key:"i",style:{marginBottom:28}},
      React.createElement("h3",{style:{fontFamily:T.display,fontSize:17,fontWeight:600,marginBottom:14,color:C.navy}},"Impact Analysis"),
      React.createElement("div",{style:{maxWidth:500}},React.createElement(HBarChart,{data:barData}))
    ));
  }

  sections.push(React.createElement(RawToggle,{key:"raw",data}));
  return React.createElement("div",{style:{animation:"fadeUp 0.4s ease"}},sections);
}

function RawToggle({data}){
  const[open,setOpen]=useState(false);
  return React.createElement("div",{style:{marginTop:12}},
    React.createElement("button",{onClick:()=>setOpen(!open),style:{...btnOutline,fontSize:11,padding:"6px 14px",color:C.faint}},open?"Hide JSON ▲":"Show JSON ▼"),
    open&&React.createElement("div",{style:{marginTop:12,background:C.borderLight,borderRadius:8,border:`1px solid ${C.border}`,padding:20}},
      React.createElement("pre",{style:{fontFamily:T.mono,fontSize:11,color:C.slate,lineHeight:1.6,whiteSpace:"pre-wrap",overflowX:"auto",wordBreak:"break-word"}},JSON.stringify(data,null,2))
    )
  );
}

/* ═══ AUTH ═══ */
function AuthScreen({onAuth}){
  const[mode,setMode]=useState("login");
  const[email,setEmail]=useState("");const[pw,setPw]=useState("");const[tenant,setTenant]=useState("");
  const[loading,setLoading]=useState(false);const[err,setErr]=useState("");

  const go=async()=>{
    setLoading(true);setErr("");
    try{
      if(mode==="register"){
        await apiFetch("/api/v1/auth/register",null,{method:"POST",body:JSON.stringify({tenant_name:tenant||"Default",tenant_slug:(tenant||"default").toLowerCase().replace(/\s+/g,"-"),admin_email:email,admin_password:pw})});
        setMode("login");alert("Account created — now sign in.");
      }else{
        const d=await apiFetch("/api/v1/auth/login",null,{method:"POST",body:JSON.stringify({email,password:pw,tenant_slug:(tenant||"default").toLowerCase().replace(/\s+/g,"-")})});
        onAuth(d.access_token,email);
      }
    }catch(e){setErr(e.message)}finally{setLoading(false)}
  };

  return React.createElement("div",{style:{minHeight:"100vh",background:"linear-gradient(180deg,#f8f9fb 0%,#eef1f6 100%)",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",fontFamily:T.body,color:C.navy,padding:24}},
    React.createElement("div",{style:{animation:"fadeUp .5s ease",maxWidth:400,width:"100%"}},
      React.createElement("div",{style:{textAlign:"center",marginBottom:40}},
        React.createElement("div",{style:{fontFamily:T.display,fontSize:36,fontWeight:700,color:C.navy,letterSpacing:"-0.02em",marginBottom:2}},"GrineOS"),
        React.createElement("div",{style:{fontSize:12,color:C.soft,letterSpacing:"0.14em",textTransform:"uppercase",fontWeight:400}},"Allocation Intelligence Platform")
      ),
      React.createElement("div",{style:{background:C.white,borderRadius:10,border:`1px solid ${C.border}`,padding:32,boxShadow:"0 4px 24px rgba(0,0,0,0.04)"}},
        React.createElement("div",{style:{display:"flex",marginBottom:24,borderRadius:6,overflow:"hidden",border:`1px solid ${C.border}`}},
          ["login","register"].map(m=>React.createElement("button",{key:m,onClick:()=>{setMode(m);setErr("")},style:{flex:1,padding:"9px 0",background:mode===m?C.navy:"transparent",color:mode===m?"#fff":C.soft,border:"none",fontFamily:T.body,fontSize:12,fontWeight:600,cursor:"pointer",textTransform:"uppercase",letterSpacing:"0.06em",transition:"all .2s"}},m))
        ),
        React.createElement("div",{style:{marginBottom:14}},
          React.createElement("label",{style:lbl},mode==="register"?"Firm Name":"Tenant Slug"),
          React.createElement("input",{style:inp,value:tenant,onChange:e=>setTenant(e.target.value),placeholder:mode==="register"?"KG&Co":"e.g. kgco"})
        ),
        React.createElement("div",{style:{marginBottom:14}},
          React.createElement("label",{style:lbl},"Email"),
          React.createElement("input",{style:inp,type:"email",value:email,onChange:e=>setEmail(e.target.value),placeholder:"analyst@firm.com"})
        ),
        React.createElement("div",{style:{marginBottom:20}},
          React.createElement("label",{style:lbl},"Password"),
          React.createElement("input",{style:inp,type:"password",value:pw,onChange:e=>setPw(e.target.value),placeholder:"••••••••",onKeyDown:e=>e.key==="Enter"&&go()})
        ),
        err&&React.createElement("div",{style:{...eBox,marginTop:0,marginBottom:16}},err),
        React.createElement("button",{onClick:go,disabled:loading,style:{...btnPrimary,width:"100%",padding:"12px",fontSize:14,opacity:loading?0.6:1}},loading&&React.createElement(Spin,null),mode==="login"?"Sign In":"Create Account")
      ),
      React.createElement("div",{style:{textAlign:"center",marginTop:28,fontSize:11,color:C.faint}},"KG&Co Capital Advisory · London · New York")
    )
  );
}

/* ═══ TABS ═══ */
const TABS=[{id:"demo",label:"Demo Portfolio"},{id:"agent",label:"Agent"},{id:"optimize",label:"Optimizer"},{id:"backtest",label:"Backtest"},{id:"scenarios",label:"Scenarios"},{id:"portfolios",label:"Portfolios"},{id:"analytics",label:"Analytics"}];

function AgentTab({token,demoP}){
  const[input,setInput]=useState("");const[msgs,setMsgs]=useState([]);const[loading,setLoading]=useState(false);
  const endRef=useRef(null);
  useEffect(()=>{endRef.current?.scrollIntoView({behavior:"smooth"})},[msgs]);
  const send=async()=>{
    if(!input.trim()||loading)return;const q=input.trim();setInput("");
    setMsgs(p=>[...p,{role:"user",content:q}]);setLoading(true);
    try{
      const portfolio=demoP||{id:"default",name:"Default",client_name:"Client",holdings:[],as_of_date:new Date().toISOString().split("T")[0]};
      const d=await apiFetch("/api/v1/agent/chat",token,{method:"POST",body:JSON.stringify({message:q,portfolio})});
      setMsgs(p=>[...p,{role:"ai",content:d.response||d.message||JSON.stringify(d,null,2)}]);
    }catch(e){setMsgs(p=>[...p,{role:"err",content:e.message}])}finally{setLoading(false)}
  };
  const prompts=["What are the biggest risks in this portfolio?","Optimize for maximum Sharpe ratio","Run a 2008-style stress test"];
  return React.createElement("div",{style:{display:"flex",flexDirection:"column",height:"100%"}},
    React.createElement("div",{style:{flex:1,overflowY:"auto",padding:"28px 32px",display:"flex",flexDirection:"column",gap:14}},
      msgs.length===0&&React.createElement("div",{style:{flex:1,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:16}},
        React.createElement("div",{style:{fontFamily:T.display,fontSize:20,color:C.navy,fontWeight:600}},"Allocation Agent"),
        React.createElement("div",{style:{color:C.soft,fontSize:14}},"Describe a portfolio task to get started."),
        React.createElement("div",{style:{display:"flex",gap:8,flexWrap:"wrap",justifyContent:"center",maxWidth:560}},
          prompts.map((p,i)=>React.createElement("button",{key:i,onClick:()=>setInput(p),style:{...btnOutline,fontSize:12,padding:"8px 14px",borderRadius:20,maxWidth:220,textAlign:"left",lineHeight:1.4}},p))
        )
      ),
      msgs.map((m,i)=>React.createElement("div",{key:i,style:{display:"flex",justifyContent:m.role==="user"?"flex-end":"flex-start",animation:"slideIn .3s ease"}},
        React.createElement("div",{style:{maxWidth:"72%",padding:"14px 18px",borderRadius:12,fontSize:14,lineHeight:1.7,whiteSpace:"pre-wrap",fontFamily:m.role==="ai"?T.mono:T.body,
          ...(m.role==="user"?{background:C.navy,color:"#fff"}:m.role==="err"?{background:C.redBg,border:`1px solid ${C.red}22`,color:C.red}:{background:C.white,border:`1px solid ${C.border}`,color:C.navy})}},
          m.role==="ai"&&React.createElement("div",{style:{fontSize:10,color:C.blue,fontWeight:700,textTransform:"uppercase",letterSpacing:"0.08em",marginBottom:6,fontFamily:T.mono}},"Grine Agent"),
          m.content
        )
      )),
      loading&&React.createElement("div",{style:{color:C.soft,fontSize:12,display:"flex",alignItems:"center"}},React.createElement(Spin,{dark:true}),"Processing..."),
